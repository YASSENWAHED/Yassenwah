<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى رزان الغالية</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;800&family=Dancing+Script:wght@700&display=swap');

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            font-family: 'Tajawal', sans-serif;
            overflow: hidden;
        }

        /* خلفية القلوب المتحركة */
        .hearts-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .heart-shape {
            position: absolute;
            background-color: rgba(255, 255, 255, 0.4);
            display: inline-block;
            height: 30px;
            margin: 0 10px;
            top: -50px;
            transform: rotate(-45deg);
            width: 30px;
            animation: float 10s linear infinite;
        }

        .heart-shape:before, .heart-shape:after {
            content: "";
            background-color: inherit;
            border-radius: 50%;
            height: 30px;
            position: absolute;
            width: 30px;
        }

        .heart-shape:before { top: -15px; left: 0; }
        .heart-shape:after { left: 15px; top: 0; }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(-45deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(-45deg); opacity: 0; }
        }

        /* حاوية التصميم الرئيسية */
        .container {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            width: 80%;
            max-width: 450px;
            transition: all 0.5s ease-in-out;
        }

        .love-btn {
            font-family: 'Dancing Script', cursive;
            font-size: 80px;
            color: #ff4d6d;
            cursor: pointer;
            transition: transform 0.3s ease;
            display: inline-block;
            user-select: none;
        }

        .love-btn:hover {
            transform: scale(1.1);
            text-shadow: 0 0 20px rgba(255, 77, 109, 0.4);
        }

        /* محتوى رزان المخفي */
        #secret-content {
            display: none;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s ease;
        }

        .name {
            font-size: 45px;
            font-weight: 800;
            color: #c9184a;
            margin-bottom: 20px;
            display: block;
        }

        .message {
            font-size: 18px;
            line-height: 1.8;
            color: #590d22;
            font-weight: 500;
        }

        .show {
            display: block !important;
            opacity: 1 !important;
            transform: translateY(0) !important;
        }

        .fade-out {
            display: none;
        }
    </style>
</head>
<body>

    <div class="hearts-bg" id="hearts-container"></div>

    <div class="container" id="main-card">
        <div id="trigger" class="love-btn">Love</div>

        <div id="secret-content">
            <span class="name">رزان ❤️</span>
            <p class="message">
                أنتِ لستِ مجرد صديقة عابرة، بل أنتِ الأخت التي لم تلدها أمي، والسند الذي أتجمل به. شكراً لأنكِ في حياتي، وشكراً لكونكِ رزان التي تنشر الفرح أينما كانت.
            </p>
        </div>
    </div>

    <script>
        // إنشاء قلوب متطايرة بشكل عشوائي
        const container = document.getElementById('hearts-container');
        for (let i = 0; i < 20; i++) {
            const heart = document.createElement('div');
            heart.className = 'heart-shape';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 5 + 5) + 's';
            heart.style.opacity = Math.random();
            container.appendChild(heart);
        }

        // تفاعل الضغط
        const trigger = document.getElementById('trigger');
        const content = document.getElementById('secret-content');
        const card = document.getElementById('main-card');

        trigger.addEventListener('click', () => {
            trigger.style.display = 'none';
            content.classList.add('show');
            card.style.background = 'rgba(255, 255, 255, 0.45)';
            
            // إضافة تأثير قلوب إضافية عند الضغط
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'heart-shape';
                    heart.style.left = Math.random() * 100 + 'vw';
                    heart.style.backgroundColor = '#ff4d6d';
                    heart.style.animationDuration = '3s';
                    container.appendChild(heart);
                }, i * 100);
            }
        });
    </script>
</body>
</html>
