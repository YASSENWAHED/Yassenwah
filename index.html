<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تهنئة عيد خاصة</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Tajawal:wght@300;500;800&family=Dancing+Script:wght@700&display=swap');

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
            font-family: 'Tajawal', sans-serif;
            overflow: hidden;
        }

        /* خلفية القلوب المتحركة */
        .hearts-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .heart-shape {
            position: absolute;
            background-color: rgba(255, 255, 255, 0.5);
            display: inline-block;
            height: 30px;
            margin: 0 10px;
            top: -50px;
            transform: rotate(-45deg);
            width: 30px;
            animation: float 8s linear infinite;
        }

        .heart-shape:before, .heart-shape:after {
            content: "";
            background-color: inherit;
            border-radius: 50%;
            height: 30px;
            position: absolute;
            width: 30px;
        }

        .heart-shape:before { top: -15px; left: 0; }
        .heart-shape:after { left: 15px; top: 0; }

        @keyframes float {
            0% { transform: translateY(110vh) rotate(-45deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(-45deg); opacity: 0; }
        }

        /* الحاوية الزجاجية */
        .container {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 40px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            width: 85%;
            max-width: 500px;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .love-btn {
            font-family: 'Dancing Script', cursive;
            font-size: 90px;
            color: #d90429;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-block;
            user-select: none;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); text-shadow: 0 0 15px rgba(217, 4, 41, 0.3); }
            100% { transform: scale(1); }
        }

        /* محتوى التهنئة */
        #secret-content {
            display: none;
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.8s ease;
        }

        .eid-title {
            font-family: 'Amiri', serif;
            font-size: 32px;
            color: #8d0801;
            margin-bottom: 10px;
            display: block;
        }

        .name {
            font-size: 50px;
            font-weight: 800;
            color: #ef233c;
            margin-bottom: 20px;
            display: block;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .message {
            font-size: 20px;
            line-height: 1.8;
            color: #2b2d42;
            font-weight: 500;
        }

        .show {
            display: block !important;
            opacity: 1 !important;
            transform: scale(1) !important;
        }
    </style>
</head>
<body>

    <div class="hearts-bg" id="hearts-container"></div>

    <div class="container" id="main-card">
        <div id="trigger" class="love-btn">Love</div>

        <div id="secret-content">
            <span class="eid-title">عيدك مبارك</span>
            <span class="name">رزان ❤️</span>
            <p class="message">
                كل عام وأنتِ الأقرب لقلبي، وأجمل هدايا القدر لي. 
                في هذا العيد، أردت أن أخبركِ أنكِ لستِ فقط صديقة وأخت، بل أنتِ العيد لكل أيامي. 
                أدامكِ الله في حياتي شمسًا لا تغيب وفرحًا لا ينتهي.
            </p>
        </div>
    </div>

    <script>
        // توليد القلوب في الخلفية
        const container = document.getElementById('hearts-container');
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart-shape';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 6) + 's';
            heart.style.opacity = Math.random() * 0.5 + 0.3;
            container.appendChild(heart);
            
            // إزالة القلوب بعد انتهاء الأنميشن لتوفير الذاكرة
            setTimeout(() => { heart.remove(); }, 8000);
        }

        setInterval(createHeart, 400);

        // تفاعل الضغط
        const trigger = document.getElementById('trigger');
        const content = document.getElementById('secret-content');
        
        trigger.addEventListener('click', () => {
            trigger.style.display = 'none';
            content.classList.add('show');
            
            // إضافة انفجار من القلوب الملونة عند الضغط
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'heart-shape';
                    heart.style.left = Math.random() * 100 + 'vw';
                    heart.style.backgroundColor = '#d90429';
                    heart.style.animationDuration = '4s';
                    container.appendChild(heart);
                }, i * 50);
            }
        });
    </script>
</body>
</html>
